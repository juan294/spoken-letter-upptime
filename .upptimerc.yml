owner: juan294
repo: spoken-letter-upptime

sites:
  - name: Spoken Letter (Website)
    url: https://spokenletter.com/api/health
    method: GET
    expectedStatusCode: 200

  - name: Audio Worker Health
    url: https://spoken-letter-audio-669385342075.europe-west1.run.app/health
    method: GET
    expectedStatusCode: 200

status-website:
  baseUrl: /spoken-letter-upptime
  name: Spoken Letter Status
  theme: dark
  introTitle: "**Spoken Letter** uptime and status monitoring."
  introMessage: This status page tracks the availability of [Spoken Letter](https://spokenletter.com), where families record stories told in the voices of the people who love them, and its Cloud Run audio-mixing worker.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "*/5 * * * *"
  uptime: "*/5 * * * *"
